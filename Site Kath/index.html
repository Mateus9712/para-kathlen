<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho uma pergunta importante...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: all 0.3s ease;
        }

        .gif-container {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .gif-container img {
            max-height: 100%;
            border-radius: 15px;
        }

        h1 {
            color: #d63031;
            font-size: 22px;
            margin-bottom: 25px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botoes {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
            position: relative;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, font-size 0.2s;
        }

        #sim {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #sim:hover {
            transform: scale(1.1);
        }

        #nao {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <img id="imagem-gif" src="inicio.gif" alt="Fofo inicial">
        </div>
        
        <h1 id="pergunta">Quer namorar comigo? 🌹</h1>
        
        <div class="botoes">
            <button id="sim" onclick="aceitou()">SIM!</button>
            <button id="nao" onclick="recusou()">Não</button>
        </div>
    </div>

    <script>
        let cliques = 0;
        const botaoSim = document.getElementById('sim');
        const botaoNao = document.getElementById('nao');
        const textoPergunta = document.getElementById('pergunta');
        const imagemGif = document.getElementById('imagem-gif');

        // Caminhos das imagens apontando para a sua pasta local
        const etapas = [
            {
                frase: "Acho que você clicou no botão errado Kathlen, tenta de novo... 🤔",
                gif: "erro1.gif"
            },
            {
                frase: "Como assim? Você tem certeza disso? 🤨",
                gif: "erro2.gif"
            },
            {
                frase: "Vou fingir que não vi esse clique, kathlen. Vai, tenta o outro! 🥺",
                gif: "erro3.gif"
            },
            {
                frase: "Cuidado, o botão está sumindo! Diz sim logo! 😰",
                gif: "erro4.gif"
            },
            {
                frase: "Ih, travou o botão do Não, só sobrou um... 🤷‍♂️",
                gif: "erro5.gif"
            }
        ];

        function recusou() {
            cliques++;
            
            if (cliques <= etapas.length) {
                textoPergunta.innerText = etapas[cliques - 1].frase;
                imagemGif.src = etapas[cliques - 1].gif;
            }

            let escalaNao = 1 - (cliques * 0.18);
            let escalaSim = 1 + (cliques * 0.15);

            botaoNao.style.transform = `scale(${escalaNao})`;
            botaoSim.style.transform = `scale(${escalaSim})`;

            const x = Math.random() * 120 - 60;
            const y = Math.random() * 80 - 40;
            botaoNao.style.left = `${x}px`;
            botaoNao.style.top = `${y}px`;

            if (cliques >= 5) {
                botaoNao.style.display = 'none';
                textoPergunta.innerText = "Beleza, agora você não tem escolha! Aceita? 😂❤️";
                imagemGif.src = "intimacao.gif"; // Instancia o GIF local final do "Não"
            }
        }

        function aceitou() {
            document.querySelector('.container').innerHTML = `
                <div class="gif-container">
                    <img src="sucesso.gif" alt="Casal fofo comemorando">
                </div>
                <h1 style="font-size: 32px; margin-bottom: 10px;">SABIA! 😍❤️❤️</h1>
                <p style="font-size: 18px; color: #555;">Melhor escolha da sua vida! Prepara o coração. ✨</p>
            `;
        }
    </script>

</body>
</html>
